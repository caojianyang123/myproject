<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生列表 - 社区医疗预约管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <style>
        .doctor-card {
            transition: transform 0.3s ease;
        }
        .doctor-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">社区医疗预约管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">首页</a>
                    </li>
                    <li class="nav-item" id="departments-nav" style="display: none;">
                        <a class="nav-link" href="departments.html">科室列表</a>
                    </li>
                    <li class="nav-item active" id="doctors-nav" style="display: none;">
                        <a class="nav-link" href="doctors.html">医生列表</a>
                    </li>
                    <li class="nav-item" id="appointments-nav" style="display: none;">
                        <a class="nav-link" href="my-appointments.html">我的预约</a>
                    </li>
                    <li class="nav-item" id="login-nav">
                        <a class="nav-link" href="login.html">登录/注册</a>
                    </li>
                    <li class="nav-item" id="logout-nav" style="display: none;">
                        <a class="nav-link" href="#" onclick="logout()">退出登录</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- 医生列表 -->
    <section class="py-10">
        <div class="container">
            <h2 class="text-center mb-6">医生列表</h2>
            <div class="row" id="doctorList">
                <!-- 医生卡片将通过JavaScript动态生成 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-6">
        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <h3>社区医疗预约管理系统</h3>
                    <p class="mt-2">便捷医疗，触手可及</p>
                </div>
                <div class="col-md-4">
                    <h3>快速链接</h3>
                    <ul class="list-unstyled mt-2">
                        <li><a href="index.html" class="text-white">首页</a></li>
                        <li><a href="departments.html" class="text-white">科室列表</a></li>
                        <li><a href="doctors.html" class="text-white">医生列表</a></li>
                        <li><a href="login.html" class="text-white">登录/注册</a></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <h3>联系我们</h3>
                    <p class="mt-2">电话：010-12345678</p>
                    <p>邮箱：contact@community-hospital.com</p>
                </div>
            </div>
            <div class="text-center mt-4">
                <p>&copy; 2026 社区医疗预约管理系统 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    <script>
        let isLoggedIn = false;

        // 获取URL参数
        function getURLParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 检查登录状态
        window.onload = function() {
            checkLoginStatus();
        };

        // 检查登录状态
        function checkLoginStatus() {
            axios.get('/medical/user/info')
                .then(response => {
                    if (response.data.code === 200) {
                        // 已登录
                        isLoggedIn = true;
                        document.getElementById('login-nav').style.display = 'none';
                        document.getElementById('logout-nav').style.display = 'block';
                        document.getElementById('departments-nav').style.display = 'block';
                        document.getElementById('doctors-nav').style.display = 'block';
                        document.getElementById('appointments-nav').style.display = 'block';
                    } else {
                        // 未登录
                        isLoggedIn = false;
                        document.getElementById('login-nav').style.display = 'block';
                        document.getElementById('logout-nav').style.display = 'none';
                        document.getElementById('departments-nav').style.display = 'block';
                        document.getElementById('doctors-nav').style.display = 'block';
                        document.getElementById('appointments-nav').style.display = 'none';
                    }
                    loadDoctors();
                })
                .catch(error => {
                    // 未登录
                    isLoggedIn = false;
                    document.getElementById('login-nav').style.display = 'block';
                    document.getElementById('logout-nav').style.display = 'none';
                    document.getElementById('departments-nav').style.display = 'block';
                    document.getElementById('doctors-nav').style.display = 'block';
                    document.getElementById('appointments-nav').style.display = 'none';
                    loadDoctors();
                });
        }

        // 退出登录
        function logout() {
            axios.post('/medical/user/logout')
                .then(response => {
                    if (response.data.code === 200) {
                        window.location.href = 'index.html';
                    }
                });
        }

        // 获取医生列表
        function loadDoctors() {
            const departmentId = getURLParam('departmentId');
            let url = '/medical/doctor/list';
            
            if (departmentId) {
                url = `/medical/doctor/listByDepartment/${departmentId}`;
            }
            
            axios.get(url)
                .then(response => {
                    if (response.data.code === 200) {
                        const doctors = response.data.data;
                        const doctorList = document.getElementById('doctorList');
                        
                        doctors.forEach(doctor => {
                            const card = document.createElement('div');
                            card.className = 'col-md-4 mb-4';
                            const appointmentButton = isLoggedIn ? 
                                `<a href="appointment.html?doctorId=${doctor.id}" class="btn btn-primary">预约挂号</a>` : 
                                `<a href="login.html" class="btn btn-primary">登录预约</a>`;
                            card.innerHTML = `
                                <div class="card doctor-card">
                                    <div class="card-body">
                                        <h3 class="card-title">${doctor.name}</h3>
                                        <p class="card-text"><strong>性别：</strong>${doctor.gender}</p>
                                        <p class="card-text"><strong>年龄：</strong>${doctor.age}</p>
                                        <p class="card-text"><strong>职称：</strong>${doctor.title}</p>
                                        <p class="card-text"><strong>擅长：</strong>${doctor.description}</p>
                                        ${appointmentButton}
                                    </div>
                                </div>
                            `;
                            doctorList.appendChild(card);
                        });
                    }
                })
                .catch(error => {
                    console.error('获取医生列表失败:', error);
                });
        }
    </script>
</body>
</html>
