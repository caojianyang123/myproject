<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约挂号 - 社区医疗预约管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">社区医疗预约管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">首页</a>
                    </li>
                    <li class="nav-item" id="departments-nav" style="display: none;">
                        <a class="nav-link" href="departments.html">科室列表</a>
                    </li>
                    <li class="nav-item" id="doctors-nav" style="display: none;">
                        <a class="nav-link" href="doctors.html">医生列表</a>
                    </li>
                    <li class="nav-item" id="appointments-nav" style="display: none;">
                        <a class="nav-link" href="my-appointments.html">我的预约</a>
                    </li>
                    <li class="nav-item" id="login-nav">
                        <a class="nav-link" href="login.html">登录/注册</a>
                    </li>
                    <li class="nav-item" id="logout-nav" style="display: none;">
                        <a class="nav-link" href="#" onclick="logout()">退出登录</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- 预约表单 -->
    <section class="py-10">
        <div class="container">
            <h2 class="text-center mb-6">预约挂号</h2>
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <form id="appointmentForm">
                        <div class="mb-3">
                            <label for="doctorId" class="form-label">医生</label>
                            <input type="text" class="form-control" id="doctorName" readonly>
                            <input type="hidden" id="doctorId">
                        </div>
                        <div class="mb-3">
                            <label for="appointmentDate" class="form-label">预约日期</label>
                            <input type="date" class="form-control" id="appointmentDate" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">病情描述</label>
                            <textarea class="form-control" id="description" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">提交预约</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-6">
        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <h3>社区医疗预约管理系统</h3>
                    <p class="mt-2">便捷医疗，触手可及</p>
                </div>
                <div class="col-md-4">
                    <h3>快速链接</h3>
                    <ul class="list-unstyled mt-2">
                        <li><a href="index.html" class="text-white">首页</a></li>
                        <li><a href="departments.html" class="text-white">科室列表</a></li>
                        <li><a href="doctors.html" class="text-white">医生列表</a></li>
                        <li><a href="login.html" class="text-white">登录/注册</a></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <h3>联系我们</h3>
                    <p class="mt-2">电话：010-12345678</p>
                    <p>邮箱：contact@community-hospital.com</p>
                </div>
            </div>
            <div class="text-center mt-4">
                <p>&copy; 2026 社区医疗预约管理系统 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    <script>
        // 获取URL参数
        function getURLParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 检查登录状态
        window.onload = function() {
            checkLoginStatus();
        };

        // 检查登录状态
        function checkLoginStatus() {
            axios.get('/medical/user/info')
                .then(response => {
                    if (response.data.code === 200) {
                        // 已登录
                        document.getElementById('login-nav').style.display = 'none';
                        document.getElementById('logout-nav').style.display = 'block';
                        document.getElementById('departments-nav').style.display = 'block';
                        document.getElementById('doctors-nav').style.display = 'block';
                        document.getElementById('appointments-nav').style.display = 'block';
                        loadDoctorInfo();
                    } else {
                        // 未登录，重定向到登录页
                        window.location.href = 'login.html';
                    }
                })
                .catch(error => {
                    // 未登录，重定向到登录页
                    window.location.href = 'login.html';
                });
        }

        // 退出登录
        function logout() {
            axios.post('/medical/user/logout')
                .then(response => {
                    if (response.data.code === 200) {
                        window.location.href = 'index.html';
                    }
                });
        }

        // 加载医生信息
        function loadDoctorInfo() {
            const doctorId = getURLParam('doctorId');
            if (doctorId) {
                document.getElementById('doctorId').value = doctorId;
                // 这里可以根据doctorId获取医生信息，这里简化处理
                document.getElementById('doctorName').value = '医生信息加载中...';
                // 实际项目中应该调用API获取医生信息
            }
        }

        // 表单提交
        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const doctorId = document.getElementById('doctorId').value;
            const appointmentDate = document.getElementById('appointmentDate').value;
            const description = document.getElementById('description').value;

            axios.post('/medical/appointment/create', {
                doctorId: parseInt(doctorId),
                appointmentDate: appointmentDate,
                description: description
            })
            .then(response => {
                if (response.data.code === 200) {
                    alert('预约成功');
                    window.location.href = 'my-appointments.html';
                } else {
                    alert(response.data.message);
                }
            })
            .catch(error => {
                console.error('预约失败:', error);
                alert('预约失败，请稍后重试');
            });
        });
    </script>
</body>
</html>
