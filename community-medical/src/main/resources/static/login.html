<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - 社区医疗预约管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos/id/10/1920/1080');
            background-size: cover;
            background-position: center;
        }
        .login-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 400px;
        }
        .tab-content {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2 class="text-center mb-4">社区医疗预约管理系统</h2>
            
            <!-- 标签页 -->
            <ul class="nav nav-tabs" id="loginTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">登录</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">注册</button>
                </li>
            </ul>
            
            <!-- 登录表单 -->
            <div class="tab-content" id="loginTabContent">
                <div class="tab-pane fade show active" id="login" role="tabpanel">
                    <form id="loginForm" class="mt-4">
                        <div class="mb-3">
                            <label for="loginUsername" class="form-label">用户名</label>
                            <input type="text" class="form-control" id="loginUsername" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">密码</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">登录</button>
                    </form>
                </div>
                
                <!-- 注册表单 -->
                <div class="tab-pane fade" id="register" role="tabpanel">
                    <form id="registerForm" class="mt-4">
                        <div class="mb-3">
                            <label for="registerUsername" class="form-label">用户名</label>
                            <input type="text" class="form-control" id="registerUsername" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerPassword" class="form-label">密码</label>
                            <input type="password" class="form-control" id="registerPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerName" class="form-label">姓名</label>
                            <input type="text" class="form-control" id="registerName" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerPhone" class="form-label">电话</label>
                            <input type="tel" class="form-control" id="registerPhone" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerIdCard" class="form-label">身份证号</label>
                            <input type="text" class="form-control" id="registerIdCard" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">注册</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            axios.post('/medical/user/login', { username, password })
                .then(response => {
                    if (response.data.code === 200) {
                        alert('登录成功');
                        window.location.href = 'index.html';
                    } else {
                        alert(response.data.message);
                    }
                })
                .catch(error => {
                    console.error('登录失败:', error);
                    alert('登录失败，请稍后重试');
                });
        });
        
        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const name = document.getElementById('registerName').value;
            const phone = document.getElementById('registerPhone').value;
            const idCard = document.getElementById('registerIdCard').value;
            
            axios.post('/medical/user/register', { 
                username, 
                password, 
                name, 
                phone, 
                idCard 
            })
                .then(response => {
                    if (response.data.code === 200) {
                        alert('注册成功，请登录');
                        // 切换到登录标签页
                        document.getElementById('login-tab').click();
                    } else {
                        alert(response.data.message);
                    }
                })
                .catch(error => {
                    console.error('注册失败:', error);
                    alert('注册失败，请稍后重试');
                });
        });
    </script>
</body>
</html>
