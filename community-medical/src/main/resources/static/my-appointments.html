<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的预约 - 社区医疗预约管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">社区医疗预约管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">首页</a>
                    </li>
                    <li class="nav-item" id="departments-nav" style="display: none;">
                        <a class="nav-link" href="departments.html">科室列表</a>
                    </li>
                    <li class="nav-item" id="doctors-nav" style="display: none;">
                        <a class="nav-link" href="doctors.html">医生列表</a>
                    </li>
                    <li class="nav-item active" id="appointments-nav" style="display: none;">
                        <a class="nav-link" href="my-appointments.html">我的预约</a>
                    </li>
                    <li class="nav-item" id="login-nav">
                        <a class="nav-link" href="login.html">登录/注册</a>
                    </li>
                    <li class="nav-item" id="logout-nav" style="display: none;">
                        <a class="nav-link" href="#" onclick="logout()">退出登录</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- 我的预约 -->
    <section class="py-10">
        <div class="container">
            <h2 class="text-center mb-6">我的预约</h2>
            <div class="row">
                <div class="col-md-12">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>预约ID</th>
                                <th>医生</th>
                                <th>预约日期</th>
                                <th>病情描述</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="appointmentList">
                            <!-- 预约记录将通过JavaScript动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-6">
        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <h3>社区医疗预约管理系统</h3>
                    <p class="mt-2">便捷医疗，触手可及</p>
                </div>
                <div class="col-md-4">
                    <h3>快速链接</h3>
                    <ul class="list-unstyled mt-2">
                        <li><a href="index.html" class="text-white">首页</a></li>
                        <li><a href="departments.html" class="text-white">科室列表</a></li>
                        <li><a href="doctors.html" class="text-white">医生列表</a></li>
                        <li><a href="login.html" class="text-white">登录/注册</a></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <h3>联系我们</h3>
                    <p class="mt-2">电话：010-12345678</p>
                    <p>邮箱：contact@community-hospital.com</p>
                </div>
            </div>
            <div class="text-center mt-4">
                <p>&copy; 2026 社区医疗预约管理系统 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    <script>
        // 检查登录状态
        window.onload = function() {
            checkLoginStatus();
        };

        // 检查登录状态
        function checkLoginStatus() {
            axios.get('/medical/user/info')
                .then(response => {
                    if (response.data.code === 200) {
                        // 已登录
                        document.getElementById('login-nav').style.display = 'none';
                        document.getElementById('logout-nav').style.display = 'block';
                        document.getElementById('departments-nav').style.display = 'block';
                        document.getElementById('doctors-nav').style.display = 'block';
                        document.getElementById('appointments-nav').style.display = 'block';
                        loadAppointments();
                    } else {
                        // 未登录，重定向到登录页
                        window.location.href = 'login.html';
                    }
                })
                .catch(error => {
                    // 未登录，重定向到登录页
                    window.location.href = 'login.html';
                });
        }

        // 退出登录
        function logout() {
            axios.post('/medical/user/logout')
                .then(response => {
                    if (response.data.code === 200) {
                        window.location.href = 'index.html';
                    }
                });
        }

        // 获取我的预约列表
        function loadAppointments() {
            axios.get('/medical/appointment/my')
                .then(response => {
                    if (response.data.code === 200) {
                        const appointments = response.data.data;
                        const appointmentList = document.getElementById('appointmentList');
                        
                        appointments.forEach(appointment => {
                            const statusText = {
                                0: '待确认',
                                1: '已确认',
                                2: '已取消'
                            };
                            
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td>${appointment.id}</td>
                                <td>${appointment.doctor ? appointment.doctor.name : '未知'}</td>
                                <td>${appointment.appointmentDate}</td>
                                <td>${appointment.description}</td>
                                <td>${statusText[appointment.status]}</td>
                                <td>
                                    ${appointment.status === 0 ? 
                                        `<button class="btn btn-danger btn-sm" onclick="cancelAppointment(${appointment.id})")>取消预约</button>` : 
                                        '-'}
                                </td>
                            `;
                            appointmentList.appendChild(row);
                        });
                    } else {
                        alert(response.data.message);
                    }
                })
                .catch(error => {
                    console.error('获取预约列表失败:', error);
                });
        }

        // 取消预约
        function cancelAppointment(id) {
            if (confirm('确定要取消预约吗？')) {
                axios.put(`/medical/appointment/cancel/${id}`)
                    .then(response => {
                        if (response.data.code === 200) {
                            alert('取消成功');
                            window.location.reload();
                        } else {
                            alert(response.data.message);
                        }
                    })
                    .catch(error => {
                        console.error('取消预约失败:', error);
                        alert('取消失败，请稍后重试');
                    });
            }
        }
    </script>
</body>
</html>
